<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — AVERROA Procurement</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0F1117;--surface:#161B27;--surface2:#1D2535;--border:#2A3347;
          --accent:#3B82F6;--success:#10B981;--danger:#EF4444;
          --text:#E2E8F0;--muted:#64748B;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif}
    body{font-family:var(--sans);background:var(--bg);color:var(--text);
         min-height:100vh;display:flex;align-items:center;justify-content:center}
    .login-wrap{width:100%;max-width:420px;padding:24px}
    .login-card{background:var(--surface);border:1px solid var(--border);
                border-radius:12px;padding:40px 36px}
    .logo{text-align:center;margin-bottom:32px}
    .logo .company{font-family:var(--mono);font-size:13px;color:var(--accent);
                   letter-spacing:4px;text-transform:uppercase}
    .logo .system{font-size:11px;color:var(--muted);margin-top:4px}
    .logo .title{font-size:22px;font-weight:600;margin-top:16px;color:var(--text)}
    .form-group{margin-bottom:18px}
    .form-group label{display:block;font-family:var(--mono);font-size:10px;
                      color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px}
    .form-control{width:100%;background:var(--surface2);border:1px solid var(--border);
                  border-radius:6px;padding:11px 14px;color:var(--text);font-size:14px;
                  font-family:var(--sans);transition:border-color .15s}
    .form-control:focus{outline:none;border-color:var(--accent);
                        box-shadow:0 0 0 3px rgba(59,130,246,.1)}
    .btn-login{width:100%;padding:12px;background:var(--accent);color:#fff;
               border:none;border-radius:6px;font-size:14px;font-weight:500;
               cursor:pointer;transition:background .15s;margin-top:8px}
    .btn-login:hover{background:#1D4ED8}
    .flash-error{padding:12px 16px;background:rgba(239,68,68,.1);
                 border:1px solid rgba(239,68,68,.3);border-radius:6px;
                 color:#F87171;font-size:13px;margin-bottom:20px}
    .flash-success{padding:12px 16px;background:rgba(16,185,129,.1);
                   border:1px solid rgba(16,185,129,.3);border-radius:6px;
                   color:#34D399;font-size:13px;margin-bottom:20px}
    .hint{text-align:center;margin-top:20px;font-size:12px;color:var(--muted)}
    .hint span{font-family:var(--mono);color:var(--accent)}
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="logo">
      <div class="company">AVERROA</div>
      <div class="system">Procurement System</div>
      <div class="title">Sign In</div>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="flash-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" class="form-control"
               placeholder="Enter your username" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" class="form-control"
               placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn-login">Sign In →</button>
    </form>

  </div>
</div>
</body>
</html>
